baseURL = "https://blog.imagilux.org/"
defaultContentLanguage = "en"
theme = "imagilux"

enableRobotsTXT = true
summaryLength = 0

buildDrafts = false
buildFuture = false

enableEmoji = true

[pagination]
  pagerSize = 6

[imaging]
  anchor = 'Center'

[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"
  series = "series"

[sitemap]
  changefreq = 'daily'
  filename = 'sitemap.xml'
  priority = 0.5

[outputs]
  home = ["HTML"]
  page = ["HTML"]

[[menus.main]]
  name = "Home"
  pageRef = "/"
  weight = 5

[[menus.main]]
  name = "Blog"
  pageRef = "posts"
  weight = 10

[params.homepage]
  subtitle = "Explore our latest insights, stories, and discoveries"
  backgroundImage = "/images/2282bf1d-1088-417a-a357-e97e843c3173.jpg"  # Uncomment and set path to use custom background image

# -- Markup (consolidated from the old root-level markup.toml, which Hugo never
# loaded: only files under config/_default/ are auto-merged) --
[markup]
  [markup.goldmark.renderer]
    unsafe = true     # allow raw HTML embedded in markdown content
    hardWraps = true  # render single newlines as <br> — matches the one-sentence-per-line writing style

  [markup.goldmark.extensions.passthrough]
    enable = true     # keep LaTeX math delimiters intact for client-side rendering
    [markup.goldmark.extensions.passthrough.delimiters]
      block = [['\[', '\]'], ['$$', '$$']]
      inline = [['\(', '\)']]

  [markup.highlight]
    # Inline styles so syntax highlighting works without a separate Chroma stylesheet.
    # (The old markup.toml set this to false, but the theme ships/links no syntax
    # stylesheet, so false would render code blocks without colors.)
    noClasses = true

  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
